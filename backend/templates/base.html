<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CurationBot{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        :root {
            --pico-font-size: 15px;
        }
        nav { margin-bottom: 1rem; }
        .badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .badge-green  { background: #2d6a4f; color: #b7e4c7; }
        .badge-red    { background: #6b2737; color: #f4a4b8; }
        .badge-blue   { background: #1d3557; color: #a8dadc; }
        .badge-yellow { background: #5c4d1e; color: #ffd166; }
        .stat-card {
            text-align: center;
            padding: 1.5rem;
        }
        .stat-card h2 {
            margin-bottom: 0.25rem;
            font-size: 2.5rem;
        }
        .stat-card p {
            margin: 0;
            color: var(--pico-muted-color);
        }
        .actions { display: flex; gap: 0.5rem; align-items: center; }
        .actions form { margin: 0; }
        .actions button { margin: 0; padding: 0.3rem 0.7rem; font-size: 0.85rem; }
        table { font-size: 0.9rem; }
        dialog { max-width: 500px; }
        .flash {
            padding: 0.75rem 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            background: #1d3557;
            color: #a8dadc;
        }
        .flash-error { background: #6b2737; color: #f4a4b8; }
        #runtime-status { min-height: 3rem; }
        .voter-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        /* VP progress bar */
        .vp-bar-track {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            margin: 0.4rem 0 0.6rem;
            overflow: hidden;
        }
        .vp-bar-fill {
            height: 6px;
            border-radius: 3px;
            transition: width 0.5s ease;
        }
        .vp-fill-green  { background: linear-gradient(90deg, #2d6a4f, #52b788); }
        .vp-fill-yellow { background: linear-gradient(90deg, #5c4d1e, #ffd166); }
        .vp-fill-red    { background: linear-gradient(90deg, #6b2737, #ef476f); }
        /* Account stat grid */
        .account-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 0.4rem;
            margin-top: 0.3rem;
        }
        .account-stat {
            text-align: center;
        }
        .account-stat-label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--pico-muted-color);
            letter-spacing: 0.5px;
        }
        .account-stat-value {
            display: block;
            font-size: 1rem;
            font-weight: 600;
        }
        /* Engine card */
        .engine-card {
            background: var(--pico-card-background-color);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 1.1rem 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }
        .engine-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .engine-card-type {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--pico-muted-color);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            padding-bottom: 0.4rem;
        }
        .engine-stat { font-variant-numeric: tabular-nums; }
        .engine-card .account-grid {
            margin-top: 0;
        }
        /* Section headings */
        .section-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--pico-muted-color);
            margin-bottom: 0.75rem;
            padding-bottom: 0.4rem;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="container-fluid">
        <ul>
            <li><a href="/ui"><strong>CurationBot</strong></a></li>
        </ul>
        <ul>
            <li><a href="/ui">Dashboard</a></li>
            <li><a href="/ui/trails">Trails</a></li>
            <li><a href="/docs" target="_blank">API Docs</a></li>
        </ul>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <footer class="container">
        <small>CurationBot v2.0 &mdash; Multi-account Steem curation</small>
    </footer>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
