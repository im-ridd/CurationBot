name: Deploy to Hetzner

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/curation-bot
            git pull origin main
            docker build -t curation-bot .
            docker rm -f curation-bot 2>/dev/null
            docker run -d --name curation-bot --restart unless-stopped \
              -p 8001:8001 \
              --env-file .env \
              -e DATABASE_URL=sqlite:////app/data/curation_bot.db \
              -e API_HOST=0.0.0.0 \
              -v curation-bot-data:/app/data \
              curation-bot
            docker image prune -f
